<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>极简幸运饼干 Fortune Cookie</title>
    <style>
        :root {
            --bg: #FFF9F2;
            --cookie: #F5D186;
            --ink: #3A3226;
            --paper: #FFFFFF;
        }

        body {
            margin: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'PingFang SC', "Microsoft YaHei", sans-serif;
            overflow: hidden;
            touch-action: manipulation;
        }

        #stage {
            position: relative;
            width: 320px;
            height: 300px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        /* 纸条：默认隐藏在饼干下方 */
        #note {
            position: absolute;
            width: 220px;
            min-height: 90px;
            background: var(--paper);
            border: 1px solid #DDD;
            padding: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            opacity: 0;
            visibility: hidden;
            transform: scale(0.5) translateY(0);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 5; /* 初始层级较低 */
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
        }

        /* 开启状态下的纸条：飞到上方并置顶 */
        .open #note {
            opacity: 1;
            visibility: visible;
            transform: scale(1) translateY(-150px);
            z-index: 100; /* 确保置顶 */
        }

        #text {
            font-size: 15px;
            color: #444;
            line-height: 1.6;
            font-weight: bold;
            white-space: pre-line;
        }

        .cookie-box {
            position: relative;
            width: 180px;
            height: 130px;
            z-index: 10; /* 饼干基础层级 */
            transition: transform 0.3s;
        }

        .half {
            position: absolute;
            width: 100px;
            height: 130px;
            background: var(--cookie);
            border: 4px solid var(--ink);
            transition: all 0.5s ease;
        }

        .left {
            left: 0;
            border-radius: 80px 15px 15px 80px;
            border-right: none;
            transform-origin: left center;
        }

        .right {
            right: 0;
            border-radius: 15px 80px 80px 15px;
            border-left: none;
            transform-origin: right center;
        }

        /* 裂开动作 */
        .open .left { transform: translateX(-80px) rotate(-30deg); opacity: 0.7; }
        .open .right { transform: translateX(80px) rotate(30deg); opacity: 0.7; }

        .hint {
            margin-top: 40px;
            font-size: 14px;
            color: #A08C75;
            font-weight: 500;
        }

        /* 碎屑效果 */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: var(--cookie);
            border: 1px solid var(--ink);
            border-radius: 2px;
            pointer-events: none;
            z-index: 15;
        }
    </style>
</head>
<body>

    <div id="stage" onclick="toggleCookie()">
        <div id="note" id="note-container">
            <div id="text"></div>
        </div>
        <div class="cookie-box" id="cookie-box">
            <div class="half left"></div>
            <div class="half right"></div>
        </div>
    </div>

    <div class="hint" id="hint">● 点击饼干开启幸运 ●</div>

    <script>
        const quotes = [
            "DO NOT BE AFRAID OF GOING SLOWLY.\n不怕慢，就怕站。",
            "THE BEST TIME TO PLANT A TREE IS NOW.\n种树最好的时间是现在。",
            "EVERYTHING IS ON THE OTHER SIDE OF FEAR.\n你想要的一切，都在恐惧的另一面。",
            "SUCCESS IS THE COURAGE TO CONTINUE.\n重要的是继续前进的勇气。",
            "STAY GOLD.\n永葆纯真。"
        ];

        let isOpen = false;

        function toggleCookie() {
            const stage = document.getElementById('stage');
            const noteText = document.getElementById('text');
            const hint = document.getElementById('hint');

            if (!isOpen) {
                stage.classList.add('open');
                isOpen = true;
                
                // 随机文案
                const q = quotes[Math.floor(Math.random() * quotes.length)];
                noteText.innerText = q;
                hint.innerText = "● 点击任意处重置 ●";
                
                playCrunch();
                createParticles();
            } else {
                stage.classList.remove('open');
                isOpen = false;
                hint.innerText = "● 点击饼干开启幸运 ●";
                // 延迟清空文字，防止缩回时闪烁
                setTimeout(() => { if(!isOpen) noteText.innerText = ""; }, 500);
            }
        }

        function playCrunch() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const audioCtx = new AudioContext();
                const bufferSize = audioCtx.sampleRate * 0.1;
                const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < bufferSize; i++) { data[i] = Math.random() * 2 - 1; }
                const noise = audioCtx.createBufferSource();
                noise.buffer = buffer;
                const gain = audioCtx.createGain();
                gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                noise.connect(gain);
                gain.connect(audioCtx.destination);
                noise.start();
            } catch(e) { console.error("Audio error:", e); }
        }

        function createParticles() {
            const stage = document.getElementById('stage');
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                stage.appendChild(p);
                
                const angle = Math.random() * Math.PI * 2;
                const dist = 50 + Math.random() * 50;
                
                p.style.left = '50%';
                p.style.top = '50%';
                p.style.transition = "all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94)";
                
                setTimeout(() => {
                    const x = Math.cos(angle) * dist;
                    const y = Math.sin(angle) * dist;
                    p.style.transform = `translate(${x}px, ${y}px) rotate(${Math.random() * 360}deg)`;
                    p.style.opacity = '0';
                }, 20);

                setTimeout(() => p.remove(), 700);
            }
        }
    </script>
</body>
</html>
