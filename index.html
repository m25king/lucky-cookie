<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的幸运饼干</title>
    <style>
        :root { --bg: #FFF9F2; --cookie: #F5D186; --ink: #3A3226; --paper: #FFFFFF; }
        body { background: var(--bg); margin: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Courier New', Courier, "Microsoft YaHei", monospace; -webkit-tap-highlight-color: transparent; }
        
        /* 舞台区域 */
        #stage { position: relative; width: 320px; height: 320px; display: flex; justify-content: center; align-items: center; cursor: pointer; }

        /* 饼干容器 */
        .cookie-box { position: relative; width: 220px; height: 160px; transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 10; }
        
        .half { position: absolute; width: 120px; height: 160px; background: var(--cookie); border: 4px solid var(--ink); transition: all 0.4s ease-in-out; box-sizing: border-box; }
        .left { left: 0; border-radius: 100px 20px 20px 100px; border-right: none; transform-origin: center right; }
        .right { right: 0; border-radius: 20px 100px 100px 20px; border-left: none; transform-origin: center left; }

        /* 手写锯齿感 */
        .half::after { content: ''; position: absolute; width: 14px; height: 100%; background-image: linear-gradient(45deg, var(--ink) 25%, transparent 25%), linear-gradient(-45deg, var(--ink) 25%, transparent 25%); background-size: 12px 12px; top: 0; }
        .left::after { right: -7px; }
        .right::after { left: -7px; transform: rotate(180deg); }

        /* 裂开动作 */
        .open .left { transform: translateX(-90px) rotate(-35deg); opacity: 0.7; }
        .open .right { transform: translateX(90px) rotate(35deg); opacity: 0.7; }

        /* 能量便签纸 */
        #note { position: absolute; width: 240px; background: var(--paper); border: 1px solid #ddd; padding: 25px; box-shadow: 5px 5px 25px rgba(0,0,0,0.1); opacity: 0; transform: scale(0) translateY(0); transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 5; text-align: center; display: flex; align-items: center; justify-content: center; min-height: 100px; }
        .open #note { opacity: 1; transform: scale(1.1) translateY(-170px); z-index: 20; }
        
        #text { font-size: 15px; color: var(--ink); line-height: 1.8; font-weight: bold; white-space: pre-wrap; word-break: break-all; }

        .hint { margin-top: 60px; color: #A08C75; font-size: 14px; letter-spacing: 2px; animation: breathe 2s infinite ease-in-out; }
        @keyframes breathe { 0%, 100% { opacity: 0.4; } 50% { opacity: 0.9; } }
    </style>
</head>
<body>

    <div id="stage" onclick="toggle()">
        <div id="note"><div id="text"></div></div>
        <div class="cookie-box" id="cookie">
            <div class="half left"></div>
            <div class="half right"></div>
        </div>
    </div>

    <div class="hint" id="hint">● 点击饼干开启幸运 ●</div>

    <script>
        const quotes = [
            "STAY GOLD.\n永葆纯真。",
            "ACTION IS THE ANTIDOTE TO ANXIETY.\n行动是焦虑的解药。",
            "THE BEST TIME IS NOW.\n最好的时间就是现在。",
            "SUCCESS IS A JOURNEY, NOT A DESTINATION.\n成功是旅程，而非终点。",
            "BELIEVE IN YOURSELF.\n相信你自己。",
            "EVERY DAY IS A NEW BEGINNING.\n每一天都是新的开始。"
        ];

        let state = false; // false = 关, true = 开

        function toggle() {
            const stage = document.getElementById('stage');
            const text = document.getElementById('text');
            const hint = document.getElementById('hint');

            if (!state) {
                // 开启
                stage.classList.add('open');
                text.innerText = quotes[Math.floor(Math.random() * quotes.length)];
                hint.innerText = "● 点击屏幕重置 ●";
                state = true;
                playCrunch();
            } else {
                // 重置
                stage.classList.remove('open');
                hint.innerText = "● 点击饼干开启幸运 ●";
                state = false;
            }
        }

        // 模拟真实的卡擦声
        function playCrunch() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();

                oscillator.type = 'sawtooth';
                gainNode.gain.setValueAtTime(0.05, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.12);
            } catch(e) { console.log("音频播放失败，请确保浏览器允许音效"); }
        }
    </script>
</body>
</html>
